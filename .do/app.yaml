name: axloxo
region: nyc
services:
  - name: web
    github:
      repo: markcabs26/axloxo
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: npm ci && npm run build
    run_command: npm start
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_AND_BUILD_TIME
      - key: NEXT_PUBLIC_SITE_URL
        value: https://axloxo.com
        scope: RUN_AND_BUILD_TIME
      - key: STRIPE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: RESEND_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: RESEND_FROM
        value: Axloxo <orders@axloxo.com>
        scope: RUN_TIME
      - key: CUSTOM_REQUEST_TO
        value: mark@payready.com
        scope: RUN_TIME
domains:
  - domain: axloxo.com
    type: PRIMARY
  - domain: www.axloxo.com
    type: ALIAS
